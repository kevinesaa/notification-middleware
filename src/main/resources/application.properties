# Spring Boot Health API configuration

# Habilitar logging del raw body y headers antes de la deserialización
logging.level.com.corp.esaa.corp.notificationMiddleware._commons.filters.RequestBodyLoggingFilter=DEBUG

# Logging a archivo (persistido en volumen Docker)
logging.file.name=/app/logs/app.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.total-size-cap=100MB
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# RabbitMQ connection
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# Queue / Exchange / Routing Key
queue.name=${RABBITMQ_QUEUE_NAME:notification.queue}
exchange.name=${RABBITMQ_EXCHANGE_NAME:notification.exchange}
routing.key=${RABBITMQ_ROUTING_KEY:notification.key}
